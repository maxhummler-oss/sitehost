<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sitehost — self-hosted static site host</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23d97757'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='serif' font-style='italic' font-size='20' fill='%23f0ebe0'%3Es%3C/text%3E%3C/svg%3E">
</head>
<body>
<div id="grain"></div>
<main id="app"></main>
<template id="tpl-shell">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">s</span>
        <span class="brand-name">sitehost</span>
      </div>
      <nav class="topnav">
        <span class="user-chip" data-user></span>
        <button class="btn btn-ghost" data-logout>Abmelden</button>
      </nav>
    </header>
    <section class="content" data-content></section>
    <footer class="footer">
      <span>Port 6767 · Multi-site static host · nginx</span>
    </footer>
  </div>
</template>
<script src="/app.js" defer></script>
</body>
</html>
